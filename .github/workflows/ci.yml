name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck-test:
    name: Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helpdesk_hub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/helpdesk_hub
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: 'true'
      BASE_URL: http://localhost:3000
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Sync database schema
        run: npx prisma db push --skip-generate

      - name: Seed database
        run: npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Start app
        run: |
          nohup npm run start > app.log 2>&1 &
          echo $! > app.pid
          echo "Started app with PID $(cat app.pid)"

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:3000/login > /dev/null; then
              echo "App is ready after ${i}s"
              exit 0
            fi
            if ! kill -0 "$(cat app.pid)" 2>/dev/null; then
              echo "App process died before becoming ready"
              cat app.log
              exit 1
            fi
            sleep 1
          done
          echo "App failed to respond within 60s"
          cat app.log
          exit 1

      - name: Run Playwright tests
        id: pw
        run: npx playwright test --reporter=list,html 2>&1 | tee playwright.log

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== app.log ==="
          cat app.log 2>/dev/null || echo "(no app.log)"
          echo "=== playwright.log (tail) ==="
          tail -200 playwright.log 2>/dev/null || echo "(no playwright.log)"

      - name: Post failure logs as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (p, n) => {
              try {
                const data = fs.readFileSync(p, 'utf8').split('\n');
                return data.slice(-n).join('\n');
              } catch {
                return '(missing)';
              }
            };
            const pw = read('playwright.log', 200);
            const app = read('app.log', 120);
            const body = [
              '### Playwright E2E failure diagnostics',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '<details><summary>playwright.log (tail)</summary>',
              '',
              '```',
              pw,
              '```',
              '',
              '</details>',
              '',
              '<details><summary>app.log (tail)</summary>',
              '',
              '```',
              app,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log
          retention-days: 7
          if-no-files-found: ignore
