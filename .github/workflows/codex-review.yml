# PR に対して Codex の自動レビューを起動するワークフロー。
# PR 作成時 (opened) と以降の push (synchronize) で `@codex review` コメントを投稿する。
name: Codex Review

on:
  pull_request:
    # opened: PR を新規作成したとき / synchronize: 既存 PR に追加 push したとき
    types: [opened, synchronize]

# 同一 PR で連続 push した場合、古い実行はキャンセルして最新だけを残す。
concurrency:
  group: codex-review-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-codex-review:
    name: Request Codex review
    runs-on: ubuntu-latest
    # fork からの PR ではトークンが read-only になりコメント投稿できないためスキップする。
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      # PR の会話タイムラインへコメントするために必要な書き込み権限。
      pull-requests: write
    steps:
      - name: Post @codex review comment
        env:
          # gh CLI が使う認証トークン (Actions が自動発行する一時トークン)。
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # コメント対象の PR 番号。
          PR_NUMBER: ${{ github.event.pull_request.number }}
        # PR に `@codex review` とコメントして Codex の自動レビューを起動する。
        run: gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "@codex review"
